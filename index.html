<!DOCTYPE html>

<head>

<style>
body{

margin:0;
background:#0f172a;
color:white;
text-align:center;
}

header{
background:#1e293b;
padding:40px;
}

h1{
font-size:40px;

}

p{

}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:40px;

width:260px;
padding:25px;

.card:hover{
transform:scale(1.05);
}

.card h2{

}

.btn{
display:inline-block;
margin-top:15px;
padding:10px 20px;
background:#ef4444;

}

.btn.tiktok{

}

.btn.facebook{

footer{

padding:20px;

</header>

<div class="container">

<a class="btn" href="https://www.youtube.com/@gospeldramastv" target="_blank">
Visit Channel
</a>
</div>

<div class="card">
<h2>TikTok</h2>

</a>

</div>

</footer>
